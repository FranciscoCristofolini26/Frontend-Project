<section class="card planner-free-time-card" aria-labelledby="free-time-title">
  <div class="planner-free-time-card__heading">
    <h2 id="free-time-title">Tempo livre</h2>
    <mat-icon aria-hidden="true">wb_sunny</mat-icon>
  </div>
  <p class="planner-free-time-card__value">{{ freeTime() }}</p>
  <p class="planner-free-time-card__description">{{ percentage() }}% do dia disponível</p>
</section>
