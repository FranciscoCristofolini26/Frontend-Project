<section class="planner-layout" aria-label="Planejador">
  <div class="planner-layout__timeline">
    @if (viewMode() === 'daily') {
      <app-planner-day-view
        [date]="selectedDate()"
        [events]="dayEvents()"
        (eventRemoved)="removeEvent($event)"
      />
      <app-planner-unscheduled-tasks [tasks]="unscheduledTasks()" />
    } @else {
      <app-planner-week-view
        [date]="selectedDate()"
        [events]="events()"
        (eventRemoved)="removeEvent($event)"
      />
    }
  </div>

  <app-planner-sidebar
    [date]="selectedDate()"
    [events]="dayEvents()"
    [taskCount]="taskCount()"
    [eventCount]="eventCount()"
    [habits]="habits()"
    [plannedHours]="plannedHours()"
    [freeTime]="freeTime()"
    [freeTimePercentage]="freeTimePercentage()"
    (habitToggled)="toggleHabit($event)"
  />

  <app-planner-event-form
    [open]="eventFormOpen()"
    [date]="selectedDate()"
    (cancelled)="eventFormOpen.set(false)"
    (created)="createEvent($event)"
  />
</section>
