<div class="schedule-page">
  <div
    class="schedule-page__content"
    [class.schedule-page__content--task-detail]="view() === 'tarefas' && tasksDetailOpen()"
  >
    <app-header
      [activeContent]="activeContent()"
      [selectedDate]="selectedDate()"
      [viewMode]="plannerViewMode()"
      (selectedDateChange)="selectedDate.set($event)"
      (viewModeChange)="plannerViewMode.set($event)"
      (primaryAction)="onPrimaryAction($event)"
    />

    <nav class="schedule-content-switcher" aria-label="Conteúdo da agenda">
      <div class="schedule-content-switcher__tabs">
        <button
          type="button"
          (click)="setView('planejamento')"
          class="schedule-content-switcher__tab"
          [class.schedule-content-switcher__tab--active]="view() === 'planejamento'"
          [attr.aria-current]="view() === 'planejamento' ? 'page' : null"
        >
          Planner
        </button>
        <button
          type="button"
          (click)="setView('tarefas')"
          class="schedule-content-switcher__tab"
          [class.schedule-content-switcher__tab--active]="view() === 'tarefas'"
          [attr.aria-current]="view() === 'tarefas' ? 'page' : null"
        >
          Tasks
        </button>
      </div>
    </nav>

    <main class="schedule-page__main">
      @if (view() === 'planejamento') {
        <app-planning
          [selectedDate]="selectedDate()"
          [viewMode]="plannerViewMode()"
          [newEventRequest]="newEventRequest()"
        />
      } @else {
        <app-tasks (detailOpenChange)="tasksDetailOpen.set($event)" />
      }
    </main>
  </div>
</div>
